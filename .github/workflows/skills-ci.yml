name: skills-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar SkillHub
        run: pip install -e .
      - name: Validar todas as skills
        run: skill validate

  sync-and-release:
    # Roda só em push na main, depois da validação passar.
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar SkillHub
        run: pip install -e .

      - name: Regenerar registry + plugin
        run: |
          skill registry
          skill build

      - name: Commitar sincronização (se houver mudança)
        run: |
          git config user.name "skillhub-bot"
          git config user.email "skillhub-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(skillhub): sync registry + plugin [skip ci]"
            git push
          else
            echo "Nada para sincronizar."
          fi

      - name: Tags, releases e notificação no Slack
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          NOTIFY=""
          for dir in skills/*/; do
            name=$(basename "$dir")
            version=$(python -c "import yaml,sys; print(yaml.safe_load(open('$dir/skill.yaml'))['version'])")
            tag="${name}-v${version}"

            # 1) Tag: cria só se ainda não existir (local ou empurrada pelo publish).
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag já existe."
            else
              git tag "$tag"
              git push origin "$tag"
              echo "Tag $tag criada."
            fi

            # 2) Release: independente da tag — cria só se ainda não houver release.
            #    (assim um 'skill publish' que só empurrou a tag não impede o release)
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag já existe — pulando."
            else
              gh release create "$tag" -t "$tag" -n "$name v$version"
              echo "Release $tag criado."
              # acumula só o que é release NOVO (= skill de fato atualizada)
              NOTIFY="${NOTIFY}"$'\n'"• ${name} v${version}"
            fi
          done

          # 3) Notifica o Slack — só se houve release novo E o webhook está configurado.
          if [ -n "$NOTIFY" ] && [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            TEXT=":sparkles: *VEC skills updated*${NOTIFY}"$'\n\n'"Get them in Claude → Plugins → Directory → Personal → ⋯ → *Check for updates* (or wait for auto-sync)."
            payload=$(TEXT="$TEXT" python -c "import json,os;print(json.dumps({'text':os.environ['TEXT']}))")
            curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || echo "Falha ao notificar o Slack (não-fatal)."
            echo "Slack notificado."
          else
            echo "Nada novo para notificar (ou SLACK_WEBHOOK_URL não configurado)."
          fi
